<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intangible Sculpting</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <div id="app-container">
        <canvas id="app"></canvas>
      </div>
      <div id="mediapipe-container">
        <video id="mediapipe-video" autoplay playsinline hidden></video>
        <canvas id="mediapipe-canvas"></canvas>
      </div>
      <p id="debug-text"></p>
      <div id="home-container">
        <div id="home">
          <div id="home-header">
            <h1>Intangible <span>Sculpting</span></h1>
            <div class="divider"></div>
            <h3>A Gesture-Based 3D Sculpting Experience</h3>
          </div>

          <div class="item-list">
            <div class="item">
              <div class="item-text">
                <strong>Camera access required</strong>
                Used locally for hand tracking
              </div>
            </div>
          </div>

          <button id="home-btn" class="btn">
            <span class="spinner"></span>
            <span id="home-btn-label">Enable &amp; Begin</span>
          </button>

          <div id="home-error"></div>
        </div>
      </div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
